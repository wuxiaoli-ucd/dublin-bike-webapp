 <!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Dublin Bikes</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <aside>
    <h1>Directions</h1>

    <label>Start</label>
    <input id="start" placeholder="Start..." />

    <label>Destination</label>
    <input id="dest" placeholder="Destination..." />

    <button id="go">Get directions</button>

    <p id="error"></p>

    <section id="details" hidden>
      <h2>Route</h2>
      <div id="summary"></div>
      <div id="list"></div>
    </section>
  </aside>

  <div id="map"></div>

  <script src="{{ url_for('static', filename='js/index.js') }}"></script>
  <script
    src="https://maps.googleapis.com/maps/api/js?key={{ apikey }}&libraries=places&callback=initMap"
    async defer></script>
</body>
</html>
